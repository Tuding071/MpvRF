name: Build MpvRF

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ------------------------------------------------------------
      # Create the entire project structure and Gradle files
      # ------------------------------------------------------------
      - name: Create project directories
        run: |
          mkdir -p app/src/main/java/com/yourapp
          mkdir -p app/src/main/res/values
          mkdir -p app/libs

      - name: Create settings.gradle.kts
        run: |
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MpvRF"
          include(":app")
          EOF

      - name: Create project build.gradle.kts
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.23" apply false
          }
          EOF

      - name: Create app/build.gradle.kts
        run: |
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.yourapp"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.yourapp"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              buildFeatures {
                  compose = true
              }
              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.10"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation(platform("androidx.compose:compose-bom:2024.04.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")

              // mpv AAR
              implementation("dev.jdtech.mpv:libmpv:0.5.1")

              // Custom seekbar used in PlayerOverlay
              implementation("dev.vivvvek:seeker:0.1.0")

              // Kotlin immutable collections
              implementation("org.jetbrains.kotlinx:kotlinx-collections-immutable:0.3.7")
          }
          EOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          kotlin.code.style=official
          EOF

      - name: Create empty resource files
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">MpvRF</string>
          </resources>
          EOF

      # ------------------------------------------------------------
      # Generate Gradle Wrapper using pre-installed Gradle
      # ------------------------------------------------------------
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      # ------------------------------------------------------------
      # Move your Kotlin files and manifest to the correct places
      # ------------------------------------------------------------
      - name: Move MainActivity.kt to app/src/main/java/com/yourapp/
        run: |
          if [ -f MainActivity.kt ]; then
            mv MainActivity.kt app/src/main/java/com/yourapp/
          else
            echo "::error::MainActivity.kt not found in root!"
            exit 1
          fi

      - name: Move PlayerOverlay.kt to app/src/main/java/com/yourapp/
        run: |
          if [ -f PlayerOverlay.kt ]; then
            mv PlayerOverlay.kt app/src/main/java/com/yourapp/
          else
            echo "::error::PlayerOverlay.kt not found in root!"
            exit 1
          fi

      - name: Move AndroidManifest.xml to app/src/main/
        run: |
          if [ -f AndroidManifest.xml ]; then
            mv AndroidManifest.xml app/src/main/
          else
            echo "::error::AndroidManifest.xml not found in root!"
            exit 1
          fi

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MpvRF-debug
          path: app/build/outputs/apk/debug/app-debug.apk
