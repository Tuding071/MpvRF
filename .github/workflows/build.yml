name: Build MpvRF APK

permissions:
  contents: write

# MANUAL TRIGGER ONLY
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'APK version name'
        required: false
        default: '1.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ============================================
      # CREATE PROJECT STRUCTURE
      # ============================================
      - name: Create Android project directories
        run: |
          mkdir -p app/src/main/java/is/xyz/mpv
          mkdir -p app/src/main/java/app/marlboroadvance/mpvrf
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper

      # ============================================
      # COPY YOUR FILES
      # ============================================
      - name: Copy native libraries
        run: cp -r libs/arm64-v8a/* app/src/main/jniLibs/arm64-v8a/ || true
          
      - name: Copy PlayerOverlay UI
        run: cp ui/PlayerOverlay.kt app/src/main/java/app/marlboroadvance/mpvrf/ || true

      # ============================================
      # GENERATE GRADLE WRAPPER
      # ============================================
      - name: Generate gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download Gradle wrapper
        run: |
          cd gradle/wrapper
          curl -LO https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          cd ../..
          echo '#!/bin/sh' > gradlew
          echo 'exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      # ============================================
      # GRADLE PROPERTIES
      # ============================================
      - name: Generate gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

      # ============================================
      # BUILD FILES
      # ============================================
      - name: Generate settings.gradle.kts
        run: |
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MpvRF"
          include(":app")
          EOF

      - name: Generate build.gradle.kts (Project)
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.23" apply false
          }
          EOF

      - name: Generate build.gradle.kts (App)
        run: |
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "app.marlboroadvance.mpvrf"
              compileSdk = 34

              defaultConfig {
                  applicationId = "app.marlboroadvance.mpvrf"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "${{ github.event.inputs.version_name || '1.0' }}"

                  ndk {
                      abiFilters += listOf("arm64-v8a")
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
                  freeCompilerArgs += listOf(
                      "-opt-in=kotlin.RequiresOptIn",
                      "-opt-in=androidx.compose.foundation.ExperimentalFoundationApi",
                      "-opt-in=androidx.compose.ui.ExperimentalComposeUiApi",
                      "-opt-in=androidx.compose.animation.ExperimentalAnimationApi",
                      "-opt-in=androidx.compose.material3.ExperimentalMaterial3Api",
                      "-nowarn"
                  )
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.11"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation(platform("androidx.compose:compose-bom:2024.04.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.runtime:runtime")
              implementation("androidx.compose.runtime:runtime-livedata")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
              implementation("org.jetbrains.kotlinx:kotlinx-collections-immutable:0.3.7")
              debugImplementation("androidx.compose.ui:ui-tooling")
              debugImplementation("androidx.compose.ui:ui-test-manifest")
          }
          EOF

      # ============================================
      # GENERATE MPV BINDINGS (UPDATED WITH LOGGING)
      # ============================================
      - name: Generate MPVLib.java
        run: |
          cat > app/src/main/java/is/xyz/mpv/MPVLib.java << 'EOF'
          package is.xyz.mpv;

          import android.content.Context;
          import android.util.Log;
          import android.view.Surface;
          import java.util.concurrent.ConcurrentLinkedQueue;
          import java.util.ArrayList;

          public class MPVLib {
              private static final String TAG = "MPVLib";
              
              static {
                  try {
                      System.loadLibrary("mpv");
                      Log.d(TAG, "Loaded libmpv.so");
                      System.loadLibrary("c++_shared");
                      Log.d(TAG, "Loaded libc++_shared.so");
                      try {
                          System.loadLibrary("player");
                          Log.d(TAG, "Loaded libplayer.so");
                      } catch (Throwable t) {
                          Log.d(TAG, "libplayer.so not found (optional)");
                      }
                  } catch (Throwable t) {
                      Log.e(TAG, "Failed to load native libraries", t);
                  }
              }

              public static native void create(Context context);
              public static native void destroy();
              public static native void command(String... cmd);
              public static native void setPropertyString(String property, String value);
              public static native void setPropertyInt(String property, int value);
              public static native void setPropertyBoolean(String property, boolean value);
              public static native void setPropertyDouble(String property, double value);
              public static native String getPropertyString(String property);
              public static native int getPropertyInt(String property);
              public static native boolean getPropertyBoolean(String property);
              public static native double getPropertyDouble(String property);
              public static native void attachSurface(Surface surface);
              public static native void detachSurface();

              private static ConcurrentLinkedQueue<Runnable> eventQueue = new ConcurrentLinkedQueue<>();
              private static ArrayList<Listener> listeners = new ArrayList<>();

              public static void pollEvent() {
                  Runnable r;
                  while ((r = eventQueue.poll()) != null) {
                      try {
                          r.run();
                      } catch (Throwable t) {
                          Log.e(TAG, "Error in event handler", t);
                      }
                  }
              }

              @SuppressWarnings("unused")
              private static void sendEvent(final String event) {
                  Log.d(TAG, "MPV Event: " + event);
                  eventQueue.add(() -> {
                      for (Listener listener : listeners) {
                          try {
                              listener.onEvent(event);
                          } catch (Throwable t) {
                              Log.e(TAG, "Error in listener", t);
                          }
                      }
                  });
              }

              @SuppressWarnings("unused")
              private static void sendProperty(final String property, final String value) {
                  Log.d(TAG, "MPV Property: " + property + " = " + value);
                  eventQueue.add(() -> {
                      for (Listener listener : listeners) {
                          try {
                              listener.onPropertyChange(property, value);
                          } catch (Throwable t) {
                              Log.e(TAG, "Error in listener", t);
                          }
                      }
                  });
              }

              public static void addListener(Listener listener) { 
                  listeners.add(listener); 
              }
              
              public static void removeListener(Listener listener) { 
                  listeners.remove(listener); 
              }

              public interface Listener {
                  void onEvent(String event);
                  void onPropertyChange(String property, String value);
              }
          }
          EOF

      - name: Generate MPVView.kt (UPDATED WITH ERROR HANDLING)
        run: |
          cat > app/src/main/java/is/xyz/mpv/MPVView.kt << 'EOF'
          package `is`.xyz.mpv

          import android.content.Context
          import android.util.Log
          import android.view.Surface
          import android.view.TextureView

          class MPVView(context: Context) : TextureView(context) {
              
              private val TAG = "MPVView"
              private var surface: Surface? = null
              private var isInitialized = false

              fun initialize() {
                  try {
                      Log.d(TAG, "Initializing MPV...")
                      MPVLib.create(context)
                      isInitialized = true
                      Log.d(TAG, "MPV initialized successfully")
                  } catch (e: Exception) {
                      Log.e(TAG, "Failed to initialize MPV", e)
                  }
              }

              fun playUri(uri: String) {
                  if (!isInitialized) {
                      Log.e(TAG, "Cannot play - MPV not initialized")
                      return
                  }
                  try {
                      Log.d(TAG, "Playing URI: $uri")
                      MPVLib.command("loadfile", uri)
                  } catch (e: Exception) {
                      Log.e(TAG, "Failed to play URI", e)
                  }
              }

              fun destroy() {
                  try {
                      if (isInitialized) {
                          MPVLib.destroy()
                          isInitialized = false
                          Log.d(TAG, "MPV destroyed")
                      }
                  } catch (e: Exception) {
                      Log.e(TAG, "Error destroying MPV", e)
                  }
              }

              override fun onAttachedToWindow() {
                  super.onAttachedToWindow()
                  Log.d(TAG, "View attached to window")
              }

              override fun onDetachedFromWindow() {
                  super.onDetachedFromWindow()
                  Log.d(TAG, "View detached from window")
              }
          }
          EOF

      # ============================================
      # GENERATE MAIN ACTIVITY (WITH PERMISSION FIX)
      # ============================================
      - name: Generate MainActivity.kt
        run: |
          cat > app/src/main/java/app/marlboroadvance/mpvrf/MainActivity.kt << 'EOF'
          package app.marlboroadvance.mpvrf

          import android.Manifest
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.net.Uri
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Toast
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.platform.LocalContext
          import androidx.compose.ui.unit.dp
          import androidx.core.content.ContextCompat

          class MainActivity : ComponentActivity() {
              
              private val requestPermissionLauncher = registerForActivityResult(
                  ActivityResultContracts.RequestPermission()
              ) { isGranted ->
                  if (isGranted) {
                      Toast.makeText(this, "Permission granted! Select a video.", Toast.LENGTH_SHORT).show()
                      openFileLauncher.launch("video/*")
                  } else {
                      Toast.makeText(this, "Storage permission required to play videos", Toast.LENGTH_LONG).show()
                  }
              }

              private val openFileLauncher = registerForActivityResult(
                  ActivityResultContracts.GetContent()
              ) { uri ->
                  uri?.let {
                      startPlayerActivity(it)
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  setContent {
                      MaterialTheme {
                          MainScreen(
                              onSelectFile = {
                                  when {
                                      ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE) == PackageManager.PERMISSION_GRANTED -> {
                                          openFileLauncher.launch("video/*")
                                      }
                                      else -> {
                                          requestPermissionLauncher.launch(Manifest.permission.READ_EXTERNAL_STORAGE)
                                      }
                                  }
                              },
                              onTestMpv = {
                                  try {
                                      System.loadLibrary("mpv")
                                      Toast.makeText(this, "✅ MPV library loaded!", Toast.LENGTH_SHORT).show()
                                  } catch (e: Exception) {
                                      Toast.makeText(this, "❌ Failed to load MPV: ${e.message}", Toast.LENGTH_LONG).show()
                                  }
                              }
                          )
                      }
                  }
              }

              private fun startPlayerActivity(uri: Uri) {
                  startActivity(Intent(this, PlayerActivity::class.java).apply {
                      data = uri
                      flags = Intent.FLAG_GRANT_READ_URI_PERMISSION
                  })
              }
          }

          @Composable
          fun MainScreen(onSelectFile: () -> Unit, onTestMpv: () -> Unit) {
              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(16.dp),
                  horizontalAlignment = Alignment.CenterHorizontally,
                  verticalArrangement = Arrangement.Center
              ) {
                  Text(
                      text = "🎬 MpvRF Video Player",
                      style = MaterialTheme.typography.headlineMedium
                  )
                  
                  Spacer(modifier = Modifier.height(32.dp))
                  
                  Button(
                      onClick = onSelectFile,
                      modifier = Modifier.fillMaxWidth()
                  ) {
                      Text("📁 Select Video File")
                  }
                  
                  Spacer(modifier = Modifier.height(16.dp))
                  
                  OutlinedButton(
                      onClick = onTestMpv,
                      modifier = Modifier.fillMaxWidth()
                  ) {
                      Text("🔧 Test MPV Library")
                  }
                  
                  Spacer(modifier = Modifier.height(16.dp))
                  
                  Text(
                      text = "Or open a video file from any file manager",
                      style = MaterialTheme.typography.bodyMedium
                  )
              }
          }
          EOF

      # ============================================
      # GENERATE PLAYER ACTIVITY (WITH PERMISSION HANDLING)
      # ============================================
      - name: Generate PlayerActivity.kt
        run: |
          cat > app/src/main/java/app/marlboroadvance/mpvrf/PlayerActivity.kt << 'EOF'
          package app.marlboroadvance.mpvrf

          import android.Manifest
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.net.Uri
          import android.os.Bundle
          import android.util.Log
          import android.widget.Toast
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.layout.Box
          import androidx.compose.foundation.layout.fillMaxSize
          import androidx.compose.runtime.*
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.viewinterop.AndroidView
          import androidx.lifecycle.ViewModelProvider
          import androidx.compose.material3.MaterialTheme
          import androidx.core.content.ContextCompat
          import `is`.xyz.mpv.MPVView

          class PlayerActivity : ComponentActivity() {
              private lateinit var viewModel: PlayerViewModel
              private val TAG = "PlayerActivity"

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  Log.d(TAG, "PlayerActivity created")

                  // Check permission
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                      Log.e(TAG, "Permission not granted")
                      Toast.makeText(this, "Storage permission required", Toast.LENGTH_SHORT).show()
                      finish()
                      return
                  }

                  val videoUri = when (intent?.action) {
                      android.content.Intent.ACTION_VIEW -> intent.data
                      else -> null
                  } ?: run {
                      Log.e(TAG, "No video URI provided")
                      finish()
                      return
                  }

                  Log.d(TAG, "Video URI: $videoUri (scheme: ${videoUri.scheme})")

                  // Take persistable permission for content URIs
                  if (videoUri.scheme == "content") {
                      try {
                          contentResolver.takePersistableUriPermission(
                              videoUri,
                              Intent.FLAG_GRANT_READ_URI_PERMISSION
                          )
                          Log.d(TAG, "Took persistable permission")
                      } catch (e: Exception) {
                          Log.e(TAG, "Failed to take permission", e)
                      }
                  }

                  viewModel = ViewModelProvider(this)[PlayerViewModel::class.java]

                  setContent {
                      MaterialTheme {
                          Box(modifier = Modifier.fillMaxSize()) {
                              // Video surface (bottom layer)
                              AndroidView(
                                  factory = { context ->
                                      MPVView(context).apply {
                                          Log.d(TAG, "Creating MPVView")
                                          initialize()
                                          surfaceTextureListener = object : android.view.TextureView.SurfaceTextureListener {
                                              override fun onSurfaceTextureAvailable(
                                                  surface: android.graphics.SurfaceTexture,
                                                  width: Int,
                                                  height: Int
                                              ) {
                                                  Log.d(TAG, "Surface available, playing video")
                                                  val path = when (videoUri.scheme) {
                                                      "content" -> videoUri.toString()
                                                      "file" -> videoUri.path
                                                      else -> videoUri.toString()
                                                  }
                                                  playUri(path ?: videoUri.toString())
                                              }
                                              override fun onSurfaceTextureSizeChanged(
                                                  surface: android.graphics.SurfaceTexture,
                                                  width: Int,
                                                  height: Int
                                              ) {
                                                  Log.d(TAG, "Surface size changed: $width x $height")
                                              }
                                              override fun onSurfaceTextureDestroyed(
                                                  surface: android.graphics.SurfaceTexture
                                              ): Boolean {
                                                  Log.d(TAG, "Surface destroyed")
                                                  return true
                                              }
                                              override fun onSurfaceTextureUpdated(
                                                  surface: android.graphics.SurfaceTexture
                                              ) {}
                                          }
                                      }
                                  },
                                  modifier = Modifier.fillMaxSize()
                              )
                              
                              // UI overlay (top layer)
                              PlayerOverlay(
                                  viewModel = viewModel,
                                  modifier = Modifier.fillMaxSize()
                              )
                          }
                      }
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  Log.d(TAG, "PlayerActivity destroyed")
                  viewModel.cleanup()
              }
          }
          EOF

      # ============================================
      # GENERATE UPDATED PLAYER VIEWMODEL (WITH LOGGING)
      # ============================================
      - name: Generate PlayerViewModel.kt
        run: |
          cat > app/src/main/java/app/marlboroadvance/mpvrf/PlayerViewModel.kt << 'EOF'
          package app.marlboroadvance.mpvrf

          import android.util.Log
          import androidx.lifecycle.ViewModel
          import androidx.lifecycle.viewModelScope
          import `is`.xyz.mpv.MPVLib
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.isActive
          import kotlinx.coroutines.launch

          class PlayerViewModel : ViewModel() {
              private val TAG = "PlayerViewModel"
              
              private val _currentVolume = MutableStateFlow(50)
              val currentVolume: StateFlow<Int> = _currentVolume
              val maxVolume = 100

              private val _playbackSpeed = MutableStateFlow(1.0f)
              val playbackSpeed: StateFlow<Float> = _playbackSpeed

              private val _isPlaying = MutableStateFlow(true)
              val isPlaying: StateFlow<Boolean> = _isPlaying

              private val _currentTime = MutableStateFlow("00:00")
              val currentTime: StateFlow<String> = _currentTime

              private val _totalTime = MutableStateFlow("00:00")
              val totalTime: StateFlow<String> = _totalTime

              private val _position = MutableStateFlow(0f)
              val position: StateFlow<Float> = _position

              private val _duration = MutableStateFlow(1f)
              val duration: StateFlow<Float> = _duration

              private val _fileName = MutableStateFlow("Video")
              val fileName: StateFlow<String> = _fileName

              init {
                  Log.d(TAG, "Initializing PlayerViewModel")
                  
                  try {
                      // Initialize MPV
                      MPVLib.setPropertyString("hwdec", "auto")
                      MPVLib.setPropertyString("vo", "gpu-next")
                      MPVLib.setPropertyString("profile", "fast")
                      MPVLib.setPropertyString("cache", "no")
                      
                      // Add error listener
                      MPVLib.addListener(object : MPVLib.Listener {
                          override fun onEvent(event: String) {
                              Log.d(TAG, "MPV Event: $event")
                          }
                          
                          override fun onPropertyChange(property: String, value: String) {
                              Log.d(TAG, "MPV Property: $property = $value")
                          }
                      })
                      
                      // Get file name from MPV
                      updateFileName()
                      
                      // Start position updates
                      viewModelScope.launch {
                          while (isActive) {
                              try {
                                  val pos = MPVLib.getPropertyDouble("time-pos") ?: 0.0
                                  val dur = MPVLib.getPropertyDouble("duration") ?: 1.0
                                  
                                  _position.value = pos.toFloat()
                                  _duration.value = dur.toFloat()
                                  _currentTime.value = formatTimeSimple(pos)
                                  _totalTime.value = formatTimeSimple(dur)
                                  _isPlaying.value = MPVLib.getPropertyBoolean("pause") == false
                              } catch (e: Exception) {
                                  Log.e(TAG, "Error updating position", e)
                              }
                              delay(100)
                          }
                      }
                      
                      Log.d(TAG, "PlayerViewModel initialized successfully")
                  } catch (e: Exception) {
                      Log.e(TAG, "Error initializing PlayerViewModel", e)
                  }
              }

              fun cleanup() {
                  Log.d(TAG, "Cleaning up PlayerViewModel")
                  try {
                      MPVLib.destroy()
                  } catch (e: Exception) {
                      Log.e(TAG, "Error during cleanup", e)
                  }
              }

              private fun updateFileName() {
                  try {
                      val mediaTitle = MPVLib.getPropertyString("media-title")
                      val path = MPVLib.getPropertyString("path")
                      _fileName.value = when {
                          !mediaTitle.isNullOrBlank() -> mediaTitle.substringBeforeLast(".")
                          !path.isNullOrBlank() -> path.substringAfterLast("/").substringBeforeLast(".")
                          else -> "Video"
                      }
                      Log.d(TAG, "File name: ${_fileName.value}")
                  } catch (e: Exception) {
                      Log.e(TAG, "Error updating file name", e)
                  }
              }

              fun setVolume(volume: Int) {
                  val newVolume = volume.coerceIn(0, maxVolume)
                  _currentVolume.value = newVolume
                  try {
                      MPVLib.setPropertyInt("volume", newVolume)
                  } catch (e: Exception) {
                      Log.e(TAG, "Error setting volume", e)
                  }
              }

              fun adjustVolume(delta: Int) {
                  setVolume(_currentVolume.value + delta)
              }

              fun setSpeed(speed: Float) {
                  _playbackSpeed.value = speed
                  try {
                      MPVLib.setPropertyDouble("speed", speed.toDouble())
                  } catch (e: Exception) {
                      Log.e(TAG, "Error setting speed", e)
                  }
              }

              fun togglePause() {
                  try {
                      val isPaused = MPVLib.getPropertyBoolean("pause") ?: false
                      MPVLib.setPropertyBoolean("pause", !isPaused)
                      _isPlaying.value = !isPaused
                  } catch (e: Exception) {
                      Log.e(TAG, "Error toggling pause", e)
                  }
              }

              fun seekTo(position: Double) {
                  try {
                      MPVLib.command("seek", position.toString(), "absolute", "exact")
                  } catch (e: Exception) {
                      Log.e(TAG, "Error seeking", e)
                  }
              }

              fun seekRelative(seconds: Int) {
                  try {
                      MPVLib.command("seek", seconds.toString(), "relative", "exact")
                  } catch (e: Exception) {
                      Log.e(TAG, "Error seeking relative", e)
                  }
              }

              override fun onCleared() {
                  super.onCleared()
                  cleanup()
              }
          }

          private fun formatTimeSimple(seconds: Double): String {
              val totalSeconds = seconds.toInt()
              val hours = totalSeconds / 3600
              val minutes = (totalSeconds % 3600) / 60
              val secs = totalSeconds % 60
              return if (hours > 0) String.format("%02d:%02d:%02d", hours, minutes, secs) 
                     else String.format("%02d:%02d", minutes, secs)
          }
          EOF

      # ============================================
      # GENERATE ANDROID MANIFEST
      # ============================================
      - name: Generate AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="MpvRF"
                  android:theme="@style/Theme.MpvRF"
                  android:requestLegacyExternalStorage="true">

                  <!-- Launcher activity -->
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.MpvRF">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <!-- Player activity -->
                  <activity
                      android:name=".PlayerActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:launchMode="singleTask">

                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <data android:scheme="file" />
                          <data android:mimeType="video/*" />
                      </intent-filter>

                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <data android:scheme="content" />
                          <data android:mimeType="video/*" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # ============================================
      # GENERATE RESOURCES
      # ============================================
      - name: Generate themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.MpvRF" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

      - name: Generate strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">MpvRF</string>
          </resources>
          EOF

      # ============================================
      # CREATE VECTOR ICON
      # ============================================
      - name: Create vector icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="192dp"
              android:height="192dp"
              android:viewportWidth="192"
              android:viewportHeight="192">
              <path
                  android:fillColor="#2196F3"
                  android:pathData="M96,0C43,0 0,43 0,96s43,96 96,96 96,-43 96,-96S149,0 96,0z"/>
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M128,96L80,128L80,64z"/>
          </vector>
          EOF
          
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-hdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xxhdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xxxhdpi/ic_launcher.xml

      # ============================================
      # BUILD, SIGN, AND PACKAGE
      # ============================================
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Install apksigner
        run: |
          sudo apt-get update
          sudo apt-get install -y apksigner

      - name: Create dummy keystore
        run: |
          keytool -genkeypair -v \
            -keystore dummy.keystore \
            -storepass test1234 \
            -alias dummykey \
            -keypass test1234 \
            -dname "CN=MpvRF, OU=Development, O=MpvRF, L=Unknown, S=Unknown, C=PH" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Sign APK
        run: |
          apksigner sign \
            --ks dummy.keystore \
            --ks-key-alias dummykey \
            --ks-pass pass:test1234 \
            --key-pass pass:test1234 \
            --out MpvRF-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify APK signature
        run: apksigner verify MpvRF-signed.apk

      # ============================================
      # DATE AND ARCHIVING
      # ============================================
      - name: Get current date time in PH time
        id: datetime
        run: |
          PH_TIME=$(TZ='Asia/Manila' date +'%Y%m%d_%I%M%p')
          echo "filename_time=$PH_TIME" >> $GITHUB_OUTPUT

      - name: Save PlayerOverlay.kt from build
        run: |
          cp app/src/main/java/app/marlboroadvance/mpvrf/PlayerOverlay.kt ./PlayerOverlay.kt || true

      - name: Create zip file with APK and Kotlin file
        run: |
          mv MpvRF-signed.apk "MpvRF_${{ steps.datetime.outputs.filename_time }}.apk"
          zip "MpvRF_build_${{ steps.datetime.outputs.filename_time }}.zip" \
            "MpvRF_${{ steps.datetime.outputs.filename_time }}.apk" \
            "PlayerOverlay.kt" || true

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          path: ./MpvRF_build_${{ steps.datetime.outputs.filename_time }}.zip
          name: MpvRF-build-${{ steps.datetime.outputs.filename_time }}
