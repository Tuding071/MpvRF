name: Build MpvRF

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ------------------------------------------------------------
      # Create project directories
      # ------------------------------------------------------------
      - name: Create project directories
        run: |
          mkdir -p app/src/main/java/com/yourapp
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/values
          mkdir -p app/libs

      # ------------------------------------------------------------
      # Create launcher icon (simple vector drawable)
      # ------------------------------------------------------------
      - name: Create launcher icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#2196F3"
                  android:pathData="M0,0h108v108h-108z" />
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,27 L81,54 L54,81 L27,54 L54,27" />
          </vector>
          EOF

      # Copy the same icon to all mipmap folders
      - name: Copy icon to mipmap folders
        run: |
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-hdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xxhdpi/ic_launcher.xml
          cp app/src/main/res/drawable/ic_launcher.xml app/src/main/res/mipmap-xxxhdpi/ic_launcher.xml

      # ------------------------------------------------------------
      # Create colors.xml
      # ------------------------------------------------------------
      - name: Create colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

      # ------------------------------------------------------------
      # Create themes.xml
      # ------------------------------------------------------------
      - name: Create themes.xml
        run: |
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/purple_500</item>
                  <item name="colorPrimaryDark">@color/purple_700</item>
                  <item name="colorAccent">@color/teal_200</item>
              </style>
              
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
              
              <style name="Theme.AppCompat.Translucent" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowBackground">@android:color/transparent</item>
              </style>
          </resources>
          EOF

      # ------------------------------------------------------------
      # settings.gradle.kts
      # ------------------------------------------------------------
      - name: Create settings.gradle.kts
        run: |
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MpvRF"
          include(":app")
          EOF

      # ------------------------------------------------------------
      # project build.gradle.kts
      # ------------------------------------------------------------
      - name: Create project build.gradle.kts
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.23" apply false
          }
          EOF

      # ------------------------------------------------------------
      # app/build.gradle.kts
      # ------------------------------------------------------------
      - name: Create app/build.gradle.kts
        run: |
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.yourapp"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.yourapp"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
              buildFeatures {
                  compose = true
              }
              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.10"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation(platform("androidx.compose:compose-bom:2024.04.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")
              implementation("androidx.appcompat:appcompat:1.6.1")  // Added for AppCompat theme

              // mpv AAR
              implementation("dev.jdtech.mpv:libmpv:0.5.1")

              // Kotlin immutable collections
              implementation("org.jetbrains.kotlinx:kotlinx-collections-immutable:0.3.7")
          }
          EOF

      # ------------------------------------------------------------
      # gradle.properties
      # ------------------------------------------------------------
      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          kotlin.code.style=official
          EOF

      # ------------------------------------------------------------
      # strings.xml
      # ------------------------------------------------------------
      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">MpvRF</string>
          </resources>
          EOF

      # ------------------------------------------------------------
      # Generate Gradle Wrapper
      # ------------------------------------------------------------
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      # ------------------------------------------------------------
      # Move your Kotlin files and manifest to the correct places
      # ------------------------------------------------------------
      - name: Move MainActivity.kt
        run: |
          if [ -f MainActivity.kt ]; then
            mv MainActivity.kt app/src/main/java/com/yourapp/
          else
            echo "::error::MainActivity.kt not found!"
            exit 1
          fi

      - name: Move PlayerOverlay.kt
        run: |
          if [ -f PlayerOverlay.kt ]; then
            mv PlayerOverlay.kt app/src/main/java/com/yourapp/
          else
            echo "::error::PlayerOverlay.kt not found!"
            exit 1
          fi

      - name: Move AndroidManifest.xml
        run: |
          if [ -f AndroidManifest.xml ]; then
            mv AndroidManifest.xml app/src/main/
          else
            echo "::error::AndroidManifest.xml not found!"
            exit 1
          fi

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MpvRF-debug
          path: app/build/outputs/apk/debug/app-debug.apk
